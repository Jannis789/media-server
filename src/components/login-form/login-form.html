<!DOCTYPE html>
<div class="login-container">
  <form
    x-data="component('x-login-form')"
    class="login-form"
    @submit.prevent="login()"
  >
    <center>
      <img
        src="/icons/avatar-default-symbolic.svg"
        alt="Default Avatar Symbolic"
        class="avatar-symbolic"
      />
      <h2 class="login-title" x-interpolate>${$i18n.login}</h2>
      <hr />

      <div class="entry-rows">
        <label for="email"></label>
        <input
          type="email"
          id="email"
          name="email"
          :placeholder="$i18n.email"
          x-model="email"
          required
        />
        <br />
        <label for="password"></label>
        <input
          type="password"
          id="password"
          name="password"
          :placeholder="$i18n.password"
          x-model="password"
          required
        />
      </div>

      <div class="options">
        <label for="remember-me">
          <input
            type="checkbox"
            x-model="remember"
            id="remember-me"
            name="remember-me"
          />
          <span x-interpolate>${$i18n.rememberMe}</span>
        </label>
        <a
          href="/forgot-password"
          class="forgot-password hyperlink"
          x-interpolate
          >${$i18n.forgotPassword}</a
        >
      </div>

      <button
        type="submit"
        class="login-button"
        :disabled="loading"
        x-text="loading ? 'Logging in...' : $i18n.login"
      ></button>

      <div class="error-message" x-show="error">
        <span x-text="error"></span>
      </div>

      <div class="new-user">
        <p>
          <span x-interpolate>${$i18n.noAccount}</span>
          <a class="hyperlink" href="/register" x-interpolate
            >${$i18n.signup}</a
          >
        </p>
      </div>
    </center>
  </form>
</div>
